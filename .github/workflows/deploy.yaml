name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '!backend/**/README.md'
            frontend:
              - 'frontend/src/**'
              - 'frontend/index.html'
              - 'frontend/package*.json'
              - 'frontend/vite.config.js'
              - 'frontend/postcss.config.js'
              - 'frontend/tailwind.config.js'
              - '!frontend/**/README.md'

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build & push backend
        working-directory: backend
        run: |
          mvn package -DskipTests
          docker build -t $ECR_REGISTRY/wcfantasy-backend:latest .
          docker push $ECR_REGISTRY/wcfantasy-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY
          script: |
            aws ecr get-login-password --region us-east-2 \
              | docker login --username AWS --password-stdin $ECR_REGISTRY
            docker pull $ECR_REGISTRY/wcfantasy-backend:latest
            docker stop wcfantasy-backend || true
            docker rm   wcfantasy-backend || true
            docker run -d --name wcfantasy-backend \
              --restart unless-stopped \
              -p 127.0.0.1:8080:8080 \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_PORT=5432 \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e APP_CORS_ALLOWED_ORIGINS=${{ secrets.FRONTEND_URL }} \
              -e FRONTEND_URL=${{ secrets.FRONTEND_URL }} \
              -e MAIL_HOST=email-smtp.us-east-2.amazonaws.com \
              -e MAIL_PORT=587 \
              -e MAIL_USERNAME=${{ secrets.SES_SMTP_USERNAME }} \
              -e MAIL_PASSWORD=${{ secrets.SES_SMTP_PASSWORD }} \
              -e MAIL_SMTP_AUTH=true \
              -e MAIL_SMTP_STARTTLS=true \
              -e MAIL_FROM=${{ secrets.MAIL_FROM_ADDRESS }} \
              $ECR_REGISTRY/wcfantasy-backend:latest

  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24' }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build & deploy to S3
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.API_URL }}
        run: |
          npm ci && npm run build
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
