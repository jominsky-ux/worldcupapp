# -----------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------

# Port must match the Vite dev proxy target in vite.config.js
server.port=8080

spring.application.name=worldcupapp

# -----------------------------------------------------------------------
# CORS
# -----------------------------------------------------------------------

# Comma-separated list of allowed frontend origins.
# In production, replace with the deployed frontend URL.
app.cors.allowed-origins=http://localhost:3000

# -----------------------------------------------------------------------
# ESPN data provider
# -----------------------------------------------------------------------

# Base URL for scoreboard and match-summary endpoints.
# Override to point at a local stub or mirror for integration testing.
app.espn.base-url=https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world

# Standings uses a different ESPN API path (/apis/v2/ rather than /apis/site/v2/).
app.espn.standings-url=https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings

# -----------------------------------------------------------------------
# Database (PostgreSQL)
# -----------------------------------------------------------------------
# All values are driven by environment variables so the same artifact
# deploys locally or in AWS (ECS task definition + RDS) without rebuilding.
# AWS deployment: set DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
# via ECS task definition environment variables or AWS Secrets Manager
# (injected as env vars by the ECS secrets field).
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:worldcupapp}?sslmode=require
spring.datasource.username=${DB_USERNAME:worldcupapp}
spring.datasource.password=${DB_PASSWORD:worldcupapp}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------
# "validate" – Hibernate verifies the schema matches entities at startup
# but never alters it; all schema changes go through Flyway migrations.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------------------------------------------------
# Flyway (versioned schema migrations)
# -----------------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# -----------------------------------------------------------------------
# JWT
# -----------------------------------------------------------------------
# Secret MUST be a Base64-encoded key of at least 256 bits (32 bytes).
# Override JWT_SECRET in the environment for every non-development deployment.
# AWS: store the secret in AWS Secrets Manager and inject as an env var.
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWRldi1vbmx5LXBsZWFzZS1jaGFuZ2UtaW4tcHJvZA==}
# Token lifetime – default 24 hours; override with JWT_EXPIRATION_MS.
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------

# DEBUG logs each outbound ESPN URL; set to INFO in production to reduce noise
logging.level.com.jominsky.worldcupapp.provider.espn=DEBUG

# -----------------------------------------------------------------------
# Observability – Actuator + Prometheus
# -----------------------------------------------------------------------

# Run management endpoints on a separate port so Nginx never exposes them
# externally (Nginx only proxies port 80 → 8080; port 9090 is localhost-only).
management.server.port=9090

# Expose only health (for uptime checks) and prometheus (for Grafana Alloy).
management.endpoints.web.exposure.include=health,prometheus,info

# Don't leak internal details through the public health endpoint.
management.endpoint.health.show-details=never

# Tag every metric with the application name so Grafana dashboards can filter.
management.metrics.tags.application=${spring.application.name}

# -----------------------------------------------------------------------
# Email (Spring Mail + bracket-reminder notification)
# -----------------------------------------------------------------------
# Production: set MAIL_* vars to Amazon SES SMTP credentials (see deploy.yaml).
# Local dev:  application-local.properties points at Mailpit on localhost:1025.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# Sender address — must be a verified identity in Amazon SES for production.
app.mail.from-address=${MAIL_FROM:noreply@wcfantasy.local}

# Absolute URL of the React frontend — used in the "Complete My Bracket" CTA link.
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
