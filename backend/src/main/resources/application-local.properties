# -----------------------------------------------------------------------
# Local / mock-DB profile
# -----------------------------------------------------------------------
# Activate with: --spring.profiles.active=local
# (IntelliJ: Run config > Active profiles = local)
# (Maven):  mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# Uses H2 in-memory database so no PostgreSQL installation is required.
# Flyway is disabled; Hibernate creates the schema directly from entities.
# A DataInitializer seeds two test accounts and sample picks on startup.
# -----------------------------------------------------------------------

# -----------------------------------------------------------------------
# H2 in-memory datasource (PostgreSQL compatibility mode)
# -----------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:worldcupapp;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# -----------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# -----------------------------------------------------------------------
# Flyway – disabled (migrations use PostgreSQL DDL not compatible with H2)
# -----------------------------------------------------------------------
spring.flyway.enabled=false

# -----------------------------------------------------------------------
# H2 browser console – http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:worldcupapp   User: sa   Password: (empty)
# -----------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------
# CORS – allow the Vite dev server
# -----------------------------------------------------------------------
app.cors.allowed-origins=http://localhost:3000

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging.level.com.jominsky.worldcupapp=DEBUG
