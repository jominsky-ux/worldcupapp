# -----------------------------------------------------------------------
# Local / mock-DB profile
# -----------------------------------------------------------------------
# Activate with: --spring.profiles.active=local
# (IntelliJ: Run config > Active profiles = local)
# (Maven):  mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# Uses H2 in-memory database so no PostgreSQL installation is required.
# Flyway is disabled; Hibernate creates the schema directly from entities.
# A DataInitializer seeds two test accounts and sample picks on startup.
# -----------------------------------------------------------------------

# -----------------------------------------------------------------------
# H2 in-memory datasource (PostgreSQL compatibility mode)
# -----------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:worldcupapp;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# -----------------------------------------------------------------------
# JPA / Hibernate
# -----------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# -----------------------------------------------------------------------
# Flyway – disabled (migrations use PostgreSQL DDL not compatible with H2)
# -----------------------------------------------------------------------
spring.flyway.enabled=false

# -----------------------------------------------------------------------
# H2 browser console – http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:worldcupapp   User: sa   Password: (empty)
# -----------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------
# CORS – allow the Vite dev server
# -----------------------------------------------------------------------
app.cors.allowed-origins=http://localhost:3000

# -----------------------------------------------------------------------
# Mock data mode — controls MockDataSeeder on startup
#   NONE        (default) — only DataInitializer's 2 test users are seeded
#   GROUP_STAGE — 12 users + entries + group/3rd-place/squad picks, no knockout picks
#                 (use to test the bracket-picks UI before knockout stage)
#   FULL        — everything above + knockout picks + player match stats
#                 (use to test the leaderboard with fantasy points)
# -----------------------------------------------------------------------
app.mock.data-mode=FULL

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging.level.com.jominsky.worldcupapp=DEBUG

# -----------------------------------------------------------------------
# Observability – Actuator (local override)
# -----------------------------------------------------------------------

# In local, keep management on the same port as the app so you can reach
# http://localhost:8080/actuator/health without running a second server.
# (Production uses port 9090 so Nginx never exposes actuator externally.)
management.server.port=8080

# -----------------------------------------------------------------------
# Email (Mailpit – local SMTP catcher)
# -----------------------------------------------------------------------
# Mailpit intercepts all outbound mail and shows it in a web UI.
# Start it before running the app:
#   docker run -d --name mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit
# View captured emails at: http://localhost:8025
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from-address=noreply@wcfantasy.local
app.frontend-url=http://localhost:3000
