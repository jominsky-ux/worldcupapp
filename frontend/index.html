<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/trophy.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Fantasy 2026</title>

    <!-- Google Fonts: Bebas Neue (display headings) + DM Sans (body) -->
    <!-- These are loaded here in the HTML rather than via CSS @import
         because loading them in the <head> avoids a flash of unstyled text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      This single <div id="root"> is where React mounts the entire application.
      React takes over this element and renders all components inside it.
      You'll never need to edit the body of this file — all UI lives in JSX files.
    -->
    <div id="root"></div>

    <!--
      This script tag loads our React app. Vite processes main.jsx,
      bundles all imports, and serves the result to the browser.
      type="module" means it uses modern ES module syntax (import/export).
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
